server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: any unknown path falls back to index.html so the
    # client-side router (if added later) can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed Vite assets, never cache the entry HTML.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Slim health endpoint (Cloud Run pings the root anyway, but useful for probes).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
