# ── Cloud Build pipeline — Backend ────────────────────────────────────────────
#
# Builds the ONNX-backed FastAPI server, pushes it to Artifact Registry,
# and deploys to Cloud Run with an L4 GPU attached.
#
# One-time setup (substitute your own values):
#
#   1. Enable required APIs:
#        gcloud services enable \
#          cloudbuild.googleapis.com run.googleapis.com artifactregistry.googleapis.com \
#          --project=<YOUR_PROJECT_ID>
#
#   2. Request L4 GPU quota in the chosen region
#      (Console → IAM & Admin → Quotas → "Total Nvidia L4 GPU allocation, per project per region").
#
#   3. Create the Artifact Registry repository in the same region as Cloud Run:
#        gcloud artifacts repositories create object-tracker \
#          --repository-format=docker --location=<REGION> --project=<YOUR_PROJECT_ID>
#
#   4. Grant the Cloud Build SA access to the DVC weights bucket and Cloud Run:
#        PROJECT_NUMBER=$(gcloud projects describe <YOUR_PROJECT_ID> --format="value(projectNumber)")
#        gcloud storage buckets add-iam-policy-binding gs://<YOUR_WEIGHTS_BUCKET> \
#          --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
#          --role="roles/storage.objectViewer"
#        gcloud projects add-iam-policy-binding <YOUR_PROJECT_ID> \
#          --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
#          --role="roles/run.admin"
#        gcloud projects add-iam-policy-binding <YOUR_PROJECT_ID> \
#          --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
#          --role="roles/iam.serviceAccountUser"
#
# Trigger a build manually:
#   gcloud builds submit . --config=cloudbuild.yaml --project=<YOUR_PROJECT_ID>
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: europe-west4         # Pick a region that supports L4 GPUs.
  _SERVICE: object-tracker
  # The image path is inlined in each step. Cloud Build resolves built-ins like
  # $PROJECT_ID at step-arg level only — they aren't re-evaluated inside a
  # user-defined substitution's value.

steps:
  # ── Step 1: pull model weights from GCS via DVC ──────────────────────────
  # `.git/` is included in the upload (see .gcloudignore) so DVC has the SCM
  # context it needs. The Cloud Build SA reads from the weights bucket using
  # ADC from the GCP metadata server — no key file required.
  - name: python:3.12-slim
    id: pull-weights
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        pip install "dvc[gs]>=3.67" --quiet
        dvc pull weights

  # ── Step 2: build the Docker image ───────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    waitFor: [pull-weights]
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/object-tracker/api:$BUILD_ID
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/object-tracker/api:latest
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/object-tracker/api:latest
      - .

  # ── Step 3: push image to Artifact Registry ───────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/object-tracker/api

  # ── Step 4: deploy to Cloud Run (with L4 GPU) ────────────────────────────
  - name: gcr.io/cloud-builders/gcloud
    id: deploy
    waitFor: [push]
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/object-tracker/api:$BUILD_ID
      - --region
      - ${_REGION}
      - --platform
      - managed
      # ── GPU configuration ──
      - --gpu=1
      - --gpu-type=nvidia-l4
      - --execution-environment=gen2   # required for GPU
      - --no-cpu-throttling            # required for GPU
      # ── resources (GPU instances have minimum requirements) ──
      - --memory
      - 16Gi
      - --cpu
      - "4"
      - --timeout
      - "900"
      - --concurrency
      - "4"                            # GPU work serialises on one GPU, but
                                       # we need HTTP headroom for preflights,
                                       # health probes, and overlapping conns.
      - --min-instances
      - "0"                            # scale to zero — no idle cost
      - --max-instances
      - "1"                            # one L4 = one quota slot
      - --allow-unauthenticated

# `images:` is intentionally omitted — gcloud validates that field client-side
# before $PROJECT_ID is resolved, which makes the image-reference parser fail.
# The explicit `docker push` step (Step 3) handles registry upload.

options:
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true

timeout: 1800s
